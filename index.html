<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gallery" id="gallery">
    <button class="arrow arrow-left" id="arrowLeft" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M16 4l-8 8 8 8" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="arrow arrow-right" id="arrowRight" aria-label="Next">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M8 4l8 8-8 8" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="arrow arrow-top" id="arrowTop" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 16l8-12 8 12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="arrow arrow-bottom" id="arrowBottom" aria-label="Next">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 8l8 12 8-12" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <script src="script.js"></script>
</body>
</html>
